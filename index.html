<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Officience Visitor Check-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
      background: #0F1219;
      color: #F7F7F7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1, h2, h3, h4, h5, h6, .btn-text {
      font-family: 'Lexend', 'Segoe UI', Arial, sans-serif;
    }

    .logo-img {
      height: 56px;
      margin-bottom: 48px;
    }

    .welcome {
      font-family: 'Lexend', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #F7F7F7;
      margin-bottom: 8px;
      text-align: center;
    }

    .welcome-sub {
      font-size: 0.95rem;
      color: #A0A0A0;
      margin-bottom: 40px;
      text-align: center;
      line-height: 1.6;
    }

    #qr-box {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 48px rgba(31, 73, 191, 0.15);
    }

    .scan-label {
      font-family: 'Lexend', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: #A0A0A0;
      margin-top: 24px;
      text-align: center;
      line-height: 1.6;
    }

    .print-btn {
      margin-top: 32px;
      background: #1F49BF;
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 10px;
      font-family: 'Lexend', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .print-btn:hover {
      background: #1839a0;
    }

    .footer-note {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #A0A0A0;
      text-align: center;
    }

    /* ── Print Styles ──────────────────────────────────────── */
    @media print {
      body {
        background: #fff;
        color: #000;
        padding: 0;
        justify-content: flex-start;
        padding-top: 60px;
      }

      .logo-img {
        height: 44px;
        margin-bottom: 32px;
      }

      .welcome, .welcome-sub, .print-btn, .footer-note {
        display: none;
      }

      #qr-box {
        box-shadow: none;
        border: 2px solid #eee;
      }

      .scan-label {
        color: #333;
        font-size: 1.1rem;
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>

  <img src="https://pub-e3bac769bc084adbae54275f1413ca66.r2.dev/Logo.png" alt="Officience" class="logo-img" />

  <div class="welcome">Welcome to Officience</div>
  <div class="welcome-sub">
    Scan the QR code below to check in as a visitor.<br />
    Quét mã QR bên dưới để đăng ký khách thăm.
  </div>

  <div id="qr-box">
    <div id="qrcode"></div>
  </div>

  <div class="scan-label">
    Scan to check in &nbsp;/&nbsp; Quét để đăng ký
  </div>

  <button class="print-btn" onclick="window.print()">Print QR Code</button>

  <div class="footer-note">
    Officience &mdash; Visitor Check-In
  </div>

  <script>
    const CHECKIN_URL = 'https://officience-visitor-checkin.vercel.app/checkin.html';

    new QRCode(document.getElementById('qrcode'), {
      text: CHECKIN_URL,
      width: 260,
      height: 260,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
