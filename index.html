<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Officience Visitor Check-In</title>
  <script src="qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a1628;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #4da6e8;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.85rem;
      color: #7a9bbf;
      margin-bottom: 48px;
      letter-spacing: 1px;
    }

    /* --- Language Select Screen --- */
    #lang-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease;
    }

    .prompt {
      font-size: 1.6rem;
      font-weight: 300;
      color: #cde0f5;
      margin-bottom: 12px;
      text-align: center;
    }

    .prompt-sub {
      font-size: 1rem;
      color: #7a9bbf;
      margin-bottom: 48px;
      text-align: center;
    }

    .lang-buttons {
      display: flex;
      gap: 32px;
    }

    .lang-btn {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      border: 2px solid #1e3a5f;
      background: #0f2240;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s ease;
      font-size: 1rem;
    }

    .lang-btn:hover {
      background: #1a3a6e;
      border-color: #4da6e8;
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(77, 166, 232, 0.2);
    }

    .lang-btn .flag { font-size: 3rem; }
    .lang-btn .lang-name { font-size: 1.1rem; font-weight: 600; color: #cde0f5; }
    .lang-btn .lang-sub { font-size: 0.8rem; color: #7a9bbf; }

    /* --- QR Screen --- */
    #qr-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease;
    }

    .qr-instruction {
      font-size: 1.5rem;
      font-weight: 300;
      color: #cde0f5;
      margin-bottom: 8px;
      text-align: center;
    }

    .qr-instruction-sub {
      font-size: 0.95rem;
      color: #7a9bbf;
      margin-bottom: 36px;
      text-align: center;
    }

    #qr-box {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 48px rgba(77, 166, 232, 0.15);
    }

    .countdown-bar-wrap {
      width: 280px;
      height: 4px;
      background: #1e3a5f;
      border-radius: 4px;
      margin-top: 24px;
      overflow: hidden;
    }

    #countdown-bar {
      height: 100%;
      background: #4da6e8;
      width: 100%;
      transition: width 1s linear;
    }

    .countdown-label {
      font-size: 0.8rem;
      color: #7a9bbf;
      margin-top: 10px;
      text-align: center;
    }

    .back-btn {
      margin-top: 28px;
      background: transparent;
      border: 1px solid #1e3a5f;
      color: #7a9bbf;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: #4da6e8;
      color: #cde0f5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="logo">Officience</div>
  <div class="tagline">Visitor Check-In System</div>

  <!-- Language Selection -->
  <div id="lang-screen">
    <div class="prompt">Welcome! Xin chào!</div>
    <div class="prompt-sub">Please select your language &nbsp;/&nbsp; Vui lòng chọn ngôn ngữ</div>
    <div class="lang-buttons">
      <button class="lang-btn" onclick="showQR('vi')">
        <span class="flag">🇻🇳</span>
        <span class="lang-name">Tiếng Việt</span>
        <span class="lang-sub">Vietnamese</span>
      </button>
      <button class="lang-btn" onclick="showQR('en')">
        <span class="flag">🇬🇧</span>
        <span class="lang-name">English</span>
        <span class="lang-sub">English</span>
      </button>
    </div>
  </div>

  <!-- QR Code Display -->
  <div id="qr-screen">
    <div class="qr-instruction" id="qr-title">Scan this QR code with your phone</div>
    <div class="qr-instruction-sub" id="qr-sub">Open your camera and point it at the code below</div>
    <div id="qr-box">
      <div id="qrcode"></div>
    </div>
    <div class="countdown-bar-wrap">
      <div id="countdown-bar"></div>
    </div>
    <div class="countdown-label" id="countdown-label">Screen resets in 60s</div>
    <button class="back-btn" onclick="resetToLang()">&#8592; Back / Quay lại</button>
  </div>

  <script>
    // ─── CONFIG ────────────────────────────────────────────────────────────────
    // Update this to your hosted URL once deployed.
    // For local testing, use the full path to checkin.html.
    const CHECKIN_BASE_URL = 'checkin.html';
    const RESET_SECONDS = 60;
    // ───────────────────────────────────────────────────────────────────────────

    let countdownTimer = null;
    let qrInstance = null;

    const text = {
      vi: {
        title: 'Quét mã QR bằng điện thoại của bạn',
        sub:   'Mở camera và hướng vào mã bên dưới',
        countdown: 'Màn hình sẽ đặt lại sau',
        seconds: 'giây'
      },
      en: {
        title: 'Scan this QR code with your phone',
        sub:   'Open your camera and point it at the code below',
        countdown: 'Screen resets in',
        seconds: 's'
      }
    };

    function showQR(lang) {
      const langScreen = document.getElementById('lang-screen');
      const qrScreen   = document.getElementById('qr-screen');
      const t = text[lang];

      document.getElementById('qr-title').textContent = t.title;
      document.getElementById('qr-sub').textContent   = t.sub;

      langScreen.style.display = 'none';
      qrScreen.style.display   = 'flex';

      // Build URL with lang param and timestamp for expiry
      const ts = Date.now();
      const url = CHECKIN_BASE_URL + '?lang=' + lang + '&ts=' + ts;

      // Clear previous QR
      const qrEl = document.getElementById('qrcode');
      qrEl.innerHTML = '';
      qrInstance = new QRCode(qrEl, {
        text: url,
        width: 240,
        height: 240,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      // Countdown
      startCountdown(lang, t);
    }

    function startCountdown(lang, t) {
      clearInterval(countdownTimer);
      let remaining = RESET_SECONDS;
      const bar   = document.getElementById('countdown-bar');
      const label = document.getElementById('countdown-label');

      bar.style.transition = 'none';
      bar.style.width = '100%';

      // Force reflow before starting transition
      bar.getBoundingClientRect();
      bar.style.transition = `width ${RESET_SECONDS}s linear`;
      bar.style.width = '0%';

      label.textContent = `${t.countdown} ${remaining}${t.seconds}`;

      countdownTimer = setInterval(() => {
        remaining--;
        label.textContent = `${t.countdown} ${remaining}${t.seconds}`;
        if (remaining <= 0) {
          clearInterval(countdownTimer);
          resetToLang();
        }
      }, 1000);
    }

    function resetToLang() {
      clearInterval(countdownTimer);
      document.getElementById('qr-screen').style.display  = 'none';
      document.getElementById('lang-screen').style.display = 'flex';
    }
  </script>
</body>
</html>
